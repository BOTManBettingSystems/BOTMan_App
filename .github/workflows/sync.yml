name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install and Upload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # We install and run in the same block so the computer doesn't 'forget' the tool
          pip install -U huggingface_hub
          export PATH=$PATH:/home/runner/.local/bin
          huggingface-cli upload BOTManBettingSystems/BOTMan_Version_2 . . --repo-type space --token $HF_TOKEN
