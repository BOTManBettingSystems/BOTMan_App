name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install HF CLI
        run: pip install -U "huggingface_hub[cli]"
      - name: Direct Upload to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # This command skips Git entirely and just 'uploads' the folder
          huggingface-cli upload BOTManBettingSystems/BOTMan_Version_2 . . --repo-type space --token $HF_TOKEN
