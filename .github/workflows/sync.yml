name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # This installs the HF CLI and mirrors the repo directly
          pip install -U "huggingface_hub[cli]"
          hf config login --token $HF_TOKEN
          hf repo create Racing_Apps --repo-type space --sdk streamlit || true
          hf upload BOTManBettingSystems/Racing_Apps . . --repo-type space --delete "*"
