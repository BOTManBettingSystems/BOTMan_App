name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install and Upload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Install the latest HF tool
          pip install -U "huggingface_hub[cli]"
          
          # 2. Add the install folder to the 'Path' so the computer can see it
          export PATH=$PATH:/home/runner/.local/bin
          
          # 3. Use the new 2026 'hf' command to beam your code over
          hf upload BOTManBettingSystems/BOTMan_Version_2 . . --repo-type space --token $HF_TOKEN
